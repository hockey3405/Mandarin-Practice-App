<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="汉语学习">
<title>汉语学习</title>
<style>
  :root {
    --ink: #0f0e0d;
    --paper: #f5f0e8;
    --paper2: #ede7d9;
    --red: #c0392b;
    --red-light: #e74c3c;
    --gold: #c8963e;
    --green: #27ae60;
    --blue: #2980b9;
    --gray: #7f8c8d;
    --gray-light: #bdc3c7;
    --shadow: rgba(0,0,0,0.15);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--ink); }
  body { font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif; color: var(--ink); }

  #app { display: flex; flex-direction: column; height: 100vh; height: -webkit-fill-available; background: var(--paper); }

  /* HEADER */
  .header {
    background: var(--ink);
    color: var(--paper);
    padding: 14px 16px 10px;
    padding-top: max(14px, env(safe-area-inset-top, 14px));
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .header-title { font-size: 20px; font-weight: 700; letter-spacing: 0.02em; }
  .header-sub { font-size: 11px; color: var(--gray-light); letter-spacing: 0.1em; text-transform: uppercase; }
  .header-badge {
    background: var(--red); color: white; border-radius: 20px;
    padding: 4px 10px; font-size: 12px; font-weight: 700;
    cursor: pointer;
  }

  /* MAIN CONTENT */
  .main { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 0; }

  /* HOME SCREEN */
  .home { padding: 16px; }
  .unit-progress-card {
    background: white; border: 1px solid var(--paper2); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 16px;
  }
  .unit-progress-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .unit-progress-label { font-size: 14px; font-weight: 700; color: var(--ink); }
  .unit-progress-count { font-size: 12px; color: var(--gray); }
  .unit-progress-bar { height: 8px; background: var(--paper); border-radius: 4px; overflow: hidden; }
  .unit-progress-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.3s; }
  /* Unit selector (vocab/listen) */
  .unit-selector { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px 14px; background: white; border: 1px solid var(--paper2); border-radius: 12px; margin-bottom: 12px; }
  .unit-selector-label { font-size: 13px; font-weight: 700; color: var(--ink); }
  .unit-nav-btn { background: var(--paper); border: none; border-radius: 8px; width: 32px; height: 32px; font-size: 16px; cursor: pointer; color: var(--ink); }
  .unit-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .streak-card {
    background: var(--ink); color: var(--paper); border-radius: 16px;
    padding: 20px; margin-bottom: 16px; text-align: center;
  }
  .streak-num { font-size: 48px; font-weight: 800; color: var(--gold); line-height: 1; }
  .streak-label { font-size: 13px; color: var(--gray-light); margin-top: 4px; letter-spacing: 0.08em; }
  .streak-sub { font-size: 12px; color: var(--gray); margin-top: 8px; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: white; border-radius: 12px; padding: 14px; text-align: center;
    border: 1px solid var(--paper2);
  }
  .stat-num { font-size: 28px; font-weight: 800; color: var(--ink); }
  .stat-label { font-size: 11px; color: var(--gray); margin-top: 2px; }
  .level-progress { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid var(--paper2); }
  .level-title { font-size: 13px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .level-item { margin-bottom: 10px; }
  .level-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .level-name { font-size: 14px; font-weight: 600; }
  .level-pct { font-size: 13px; color: var(--gray); }
  .progress-bar { height: 6px; background: var(--paper2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: var(--red); transition: width 0.5s ease; }
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .mode-card {
    background: white; border-radius: 14px; padding: 16px;
    border: 1px solid var(--paper2); cursor: pointer;
    transition: transform 0.1s, background 0.1s;
    -webkit-touch-callout: none;
  }
  .mode-card:active { transform: scale(0.97); background: var(--paper2); }
  .mode-icon { font-size: 28px; margin-bottom: 8px; }
  .mode-title { font-size: 14px; font-weight: 700; }
  .mode-cn { font-size: 18px; font-weight: 800; color: var(--red); }
  .mode-desc { font-size: 11px; color: var(--gray); margin-top: 3px; }

  /* VOCAB / FLASHCARD */
  .card-screen { padding: 16px; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .progress-text { font-size: 13px; color: var(--gray); }
  .mini-progress { flex: 1; height: 4px; background: var(--paper2); border-radius: 2px; margin: 0 12px; }
  .mini-fill { height: 100%; background: var(--red); border-radius: 2px; transition: width 0.3s; }

  .flashcard {
    background: white; border-radius: 20px; padding: 40px 24px;
    text-align: center; margin-bottom: 20px; min-height: 280px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    border: 1px solid var(--paper2); cursor: pointer;
    box-shadow: 0 4px 20px var(--shadow);
    transition: transform 0.3s;
    position: relative; overflow: hidden;
  }
  .flashcard:active { transform: scale(0.99); }
  .card-level-tag {
    position: absolute; top: 14px; right: 14px;
    font-size: 10px; font-weight: 700; color: var(--gray);
    background: var(--paper); padding: 2px 8px; border-radius: 10px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .card-type-tag {
    position: absolute; top: 14px; left: 14px;
    font-size: 10px; color: var(--gray-light);
    background: var(--paper); padding: 2px 8px; border-radius: 10px;
  }
  .char-big { font-size: 72px; font-weight: 400; line-height: 1.1; color: var(--ink); }
  .pinyin-text { font-size: 20px; color: var(--red); margin-top: 10px; font-weight: 500; }
  .meaning-text { font-size: 18px; color: var(--ink); margin-top: 10px; font-weight: 500; }
  .tap-hint { font-size: 12px; color: var(--gray-light); margin-top: 20px; }
  .reveal-content { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .rating-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .rating-btn {
    padding: 14px 8px; border-radius: 12px; border: none;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
  }
  .rating-btn:active { transform: scale(0.95); }
  .btn-again { background: #fadbd8; color: #c0392b; }
  .btn-hard { background: #fdebd0; color: #d35400; }
  .btn-easy { background: #d5f5e3; color: #27ae60; }

  /* GRAMMAR */
  .grammar-screen { padding: 16px; }
  .exercise-card { background: white; border-radius: 16px; padding: 20px; border: 1px solid var(--paper2); margin-bottom: 16px; }
  .ex-pattern { font-size: 11px; font-weight: 700; color: var(--red); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .ex-instruction { font-size: 13px; color: var(--gray); margin-bottom: 16px; }
  .ex-translation { font-size: 14px; color: var(--ink); font-style: italic; margin-bottom: 16px; line-height: 1.5; }
  .hint-text { font-size: 12px; color: var(--blue); background: #eaf4fb; padding: 8px 12px; border-radius: 8px; margin-bottom: 16px; }

  /* Reorder tiles */
  .tiles-zone { min-height: 52px; border: 2px dashed var(--paper2); border-radius: 12px; padding: 8px; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; align-items: center; }
  .tiles-zone.has-tiles { border-color: var(--gray-light); border-style: solid; }
  .tile {
    background: var(--ink); color: var(--paper); padding: 8px 14px;
    border-radius: 8px; font-size: 17px; cursor: pointer;
    transition: transform 0.1s, background 0.1s;
    user-select: none; -webkit-user-select: none;
  }
  .tile:active { transform: scale(0.95); }
  .tile.source { background: var(--paper2); color: var(--ink); }
  .tile.source:active { background: var(--gray-light); }
  .answer-zone-label { font-size: 11px; color: var(--gray); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Fill / Error options */
  .options-list { display: flex; flex-direction: column; gap: 8px; }
  .option-btn {
    background: white; border: 2px solid var(--paper2); border-radius: 12px;
    padding: 14px 16px; font-size: 16px; cursor: pointer;
    text-align: left; transition: all 0.15s; color: var(--ink);
  }
  .option-btn:active { background: var(--paper2); }
  .option-btn.correct { background: #d5f5e3; border-color: var(--green); color: var(--green); }
  .option-btn.wrong { background: #fadbd8; border-color: var(--red); color: var(--red); }
  .option-btn.reveal { background: #d5f5e3; border-color: var(--green); color: var(--green); }

  /* Fill blank sentence display */
  .fill-sentence { font-size: 20px; text-align: center; padding: 20px 0; line-height: 1.8; }
  .blank-slot { display: inline-block; min-width: 60px; border-bottom: 3px solid var(--red); color: var(--red); font-weight: 700; padding: 0 4px; }

  /* Error correction */
  .error-sentence { font-size: 18px; text-align: center; padding: 16px; background: #fadbd8; border-radius: 12px; color: var(--red); margin-bottom: 16px; font-weight: 600; }

  /* Result banner */
  .result-banner {
    border-radius: 12px; padding: 14px 16px; margin-bottom: 14px;
    font-size: 14px; line-height: 1.5;
  }
  .result-banner.correct { background: #d5f5e3; color: #1e8449; }
  .result-banner.wrong { background: #fadbd8; color: #922b21; }
  .result-answer { font-weight: 700; margin-top: 4px; font-size: 16px; }

  /* Action buttons */
  .action-btn {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
  }
  .action-btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-secondary { background: var(--paper2); color: var(--ink); }
  .btn-check { background: var(--red); color: white; }

  /* LISTENING */
  .listen-screen { padding: 16px; }
  .listen-card { background: white; border-radius: 20px; padding: 40px 24px; text-align: center; border: 1px solid var(--paper2); margin-bottom: 20px; }
  .speak-btn {
    width: 80px; height: 80px; border-radius: 50%; border: none;
    background: var(--ink); cursor: pointer; font-size: 32px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px; transition: transform 0.15s, background 0.15s;
    box-shadow: 0 4px 16px var(--shadow);
  }
  .speak-btn:active { transform: scale(0.93); background: var(--red); }
  .speak-btn.playing { background: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  .listen-prompt { font-size: 14px; color: var(--gray); margin-bottom: 20px; }
  .listen-mode-toggle {
    display: flex; background: var(--paper2); border-radius: 10px;
    padding: 3px; margin-bottom: 20px;
  }
  .toggle-opt {
    flex: 1; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; text-align: center; transition: all 0.2s; color: var(--gray);
    border: none; background: transparent;
  }
  .toggle-opt.active { background: white; color: var(--ink); box-shadow: 0 1px 4px var(--shadow); }

  /* SENTENCE */
  .sentence-screen { padding: 16px; }
  .sentence-prompt { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--paper2); }
  .prompt-label { font-size: 11px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .prompt-english { font-size: 20px; font-weight: 600; color: var(--ink); line-height: 1.4; margin-bottom: 10px; }
  .prompt-hint { font-size: 12px; color: var(--blue); background: #eaf4fb; padding: 6px 12px; border-radius: 8px; }
  .chinese-input {
    width: 100%; border: 2px solid var(--paper2); border-radius: 14px;
    padding: 16px; font-size: 20px; background: white; color: var(--ink);
    margin-bottom: 12px; resize: none; min-height: 90px;
    font-family: -apple-system, 'PingFang SC', sans-serif;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .chinese-input:focus { outline: none; border-color: var(--red); }
  .answer-reveal { background: white; border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 2px solid var(--green); }
  .answer-label { font-size: 11px; color: var(--green); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .answer-cn { font-size: 20px; font-weight: 600; color: var(--ink); }
  .answer-alt { font-size: 13px; color: var(--gray); margin-top: 6px; }
  .answer-pinyin { font-size: 14px; color: var(--red); margin-top: 6px; font-style: italic; }
  .result-pinyin { font-size: 13px; margin-top: 4px; font-style: italic; opacity: 0.85; }

  /* BOTTOM NAV */
  .bottom-nav {
    display: flex; background: var(--ink); padding: 8px 0;
    padding-bottom: max(8px, var(--safe-bottom));
    border-top: 1px solid #222; flex-shrink: 0;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 6px 0; cursor: pointer; transition: opacity 0.15s;
    border: none; background: transparent;
  }
  .nav-item:active { opacity: 0.7; }
  .nav-icon { font-size: 22px; margin-bottom: 2px; }
  .nav-label { font-size: 10px; color: var(--gray); font-weight: 600; letter-spacing: 0.05em; }
  .nav-label-cn { font-size: 12px; color: var(--gray); }
  .nav-item.active .nav-label { color: var(--red); }
  .nav-item.active .nav-label-cn { color: var(--red); }

  /* LEVEL SELECTOR MODAL */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    display: flex; align-items: flex-end;
  }
  .modal-sheet {
    background: var(--paper); border-radius: 20px 20px 0 0;
    width: 100%; padding: 20px 16px;
    padding-bottom: max(20px, var(--safe-bottom));
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; text-align: center; }
  .level-option {
    display: flex; justify-content: space-between; align-items: center;
    background: white; border-radius: 12px; padding: 16px;
    margin-bottom: 8px; cursor: pointer; border: 2px solid var(--paper2);
    transition: all 0.15s;
  }
  .level-option:active { background: var(--paper2); }
  .level-option.active { border-color: var(--red); }
  .level-opt-name { font-size: 16px; font-weight: 700; }
  .level-opt-count { font-size: 13px; color: var(--gray); }
  .level-opt-pct { font-size: 13px; font-weight: 700; color: var(--red); }

  /* Utility */
  .section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .section-title { font-size: 13px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; }
  .text-center { text-align: center; }
  .mt8 { margin-top: 8px; }
  .mt12 { margin-top: 12px; }
  .mt16 { margin-top: 16px; }
  .hidden { display: none !important; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--gray); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 16px; font-weight: 600; }
  .empty-sub { font-size: 13px; margin-top: 6px; }

  /* Exercise type chip */
  .ex-type-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .ex-chip {
    padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; border: none;
  }
  .ex-chip.reorder { background: #eaf4fb; color: var(--blue); }
  .ex-chip.fill { background: #f0f3ff; color: #5b6abf; }
  .ex-chip.error { background: #fef9e7; color: var(--gold); }
  .ex-chip.active { opacity: 1; box-shadow: 0 0 0 2px currentColor; }
  .ex-chip.inactive { opacity: 0.45; }
  
  /* Mode progress cards on home */
  .mode-progress-card {
    background: white; border-radius: 14px; padding: 14px 16px;
    border: 1px solid var(--paper2); margin-bottom: 10px; cursor: pointer;
    transition: transform 0.1s, background 0.1s;
  }
  .mode-progress-card:active { transform: scale(0.98); background: var(--paper2); }
  .mode-progress-top { display: flex; align-items: center; gap: 12px; }
  .mode-progress-icon { font-size: 28px; flex-shrink: 0; }
  .mode-progress-cn { font-size: 20px; font-weight: 800; color: var(--red); line-height: 1; }
  .mode-progress-title { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .mode-progress-count { margin-left: auto; font-size: 22px; font-weight: 800; color: var(--ink); }
  .mode-progress-count span { font-size: 13px; color: var(--gray); font-weight: 400; }
  .mode-progress-label { font-size: 11px; color: var(--gray); margin-top: 4px; text-align: right; }
  .lvl-pip-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .lvl-pip { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: var(--paper2); color: var(--gray); font-weight: 600; }
  .lvl-pip.done { background: #d5f5e3; color: var(--green); }
  .score-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .score-correct { background: #d5f5e3; color: var(--green); }
  .score-wrong { background: #fadbd8; color: var(--red); }

  /* Nav badge for due count */
  .nav-item { position: relative; }
  .nav-badge {
    position: absolute; top: 4px; right: 8px;
    background: var(--red); color: white; border-radius: 10px;
    font-size: 9px; font-weight: 800; padding: 1px 5px; min-width: 16px; text-align: center;
  }

  /* Review screen */
  .review-screen { padding: 16px; }
  .review-kind-tag {
    display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 3px 8px; border-radius: 10px; margin-bottom: 10px;
  }
  .kind-vocab   { background: #eaf4fb; color: var(--blue); }
  .kind-listen  { background: #f0f3ff; color: #5b6abf; }
  .kind-grammar { background: #fef9e7; color: #c8963e; }
  .kind-sentence{ background: #eafaf1; color: var(--green); }
  .review-summary { background: white; border-radius: 16px; padding: 24px; border: 1px solid var(--paper2); text-align: center; }
  .review-summary-num { font-size: 56px; font-weight: 800; color: var(--red); line-height: 1; }
  .review-summary-label { font-size: 14px; color: var(--gray); margin-top: 6px; }
  .review-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0; }
  .review-breakdown-item { background: var(--paper); border-radius: 10px; padding: 10px; text-align: center; }
  .review-breakdown-num { font-size: 22px; font-weight: 800; }
  .review-breakdown-lbl { font-size: 11px; color: var(--gray); margin-top: 2px; }
  .score-wrong { background: #fadbd8; color: var(--red); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-title">汉语学习</div>
      <div class="header-sub">Mandarin Study</div>
    </div>
    <div class="header-badge" onclick="showLevelModal()">HSK <span id="currentLevelBadge">1</span></div>
  </div>

  <div class="main" id="mainContent"></div>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="navigate('home')" id="nav-home">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Home</div>
    </button>
    <button class="nav-item" onclick="navigate('review')" id="nav-review">
      <div class="nav-icon">🔥</div>
      <div class="nav-label">Review</div>
    </button>
    <button class="nav-item" onclick="navigate('vocab')" id="nav-vocab">
      <div class="nav-icon">🃏</div>
      <div class="nav-label-cn">词汇</div>
    </button>
    <button class="nav-item" onclick="navigate('grammar')" id="nav-grammar">
      <div class="nav-icon">📝</div>
      <div class="nav-label-cn">语法</div>
    </button>
    <button class="nav-item" onclick="navigate('listen')" id="nav-listen">
      <div class="nav-icon">👂</div>
      <div class="nav-label-cn">听力</div>
    </button>
    <button class="nav-item" onclick="navigate('sentence')" id="nav-sentence">
      <div class="nav-icon">✍️</div>
      <div class="nav-label-cn">造句</div>
    </button>
  </nav>

    {english:"As technology develops, communication becomes easier.",chinese:"随着科技的发展，沟通变得越来越容易。",pinyin:"suízhe kējì de fāzhǎn, gōutōng biàn de yuèláiyuè róngyì",alternates:["随着技术发展，交流越来越方便。"],hint:"随着...越来越"},
    {english:"I had no choice but to stay and finish the work.",chinese:"我不得不留下来完成工作。",pinyin:"wǒ bùdébù liú xiàlái wánchéng gōngzuò",alternates:["我只好留下来把工作做完。"],hint:"不得不 = have no choice but to"},
  ],
};
</script>
<script>
// ===== STATE & STORAGE =====
const STORAGE_KEY = 'hsk_progress_v8';
let state = {
  currentLevel: 1,
  unlockedLevels: [1,2,3,4,5,6],  // all levels always accessible
  currentUnit: {1:1, 2:1, 3:1, 4:1, 5:1, 6:1},  // current unit per level (1-indexed)
  highestUnit: {1:1, 2:1, 3:1, 4:1, 5:1, 6:1},  // furthest unit reached per level (never decreases)
  srsData: {},
  listenSrs: {},
  grammarData: {},
  sentenceData: {},
  streak: 0,
  lastStudied: null,
  todayCount: 0,
  lastPage: 'home',  // remember where user was
};

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
}
function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state = {...state, ...parsed};
    }
  } catch(e){}
  // Migration: initialize highestUnit from currentUnit for existing saves
  if (!state.highestUnit) {
    state.highestUnit = {};
    [1,2,3,4,5,6].forEach(lvl => {
      state.highestUnit[lvl] = state.currentUnit[lvl] || 1;
    });
  }
  // Note: SRS keys changed from "lvl_char" to "lvl_char_pinyin" to fix homograph collisions.
  // Homograph words (只, 得, 还, 过, 等, 长, 喂) will reset to unlearned for affected users — acceptable tradeoff.
  checkStreak();
  checkUnlocks();
}
function checkStreak() {
  const today = new Date().toDateString();
  if (state.lastStudied && state.lastStudied !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (state.lastStudied !== yesterday) { state.streak = 0; }
  }
}
function markStudied() {
  const today = new Date().toDateString();
  if (state.lastStudied !== today) {
    state.streak = (state.lastStudied === new Date(Date.now()-86400000).toDateString()) ? state.streak+1 : 1;
    state.lastStudied = today;
    state.todayCount = 0;
  }
  state.todayCount++;
  saveState();
}
// ===== UNIT HELPERS =====
function getLevelUnits(lvl) {
  return (HSK_DATA[lvl] && HSK_DATA[lvl].units) || [];
}
// SRS key always includes pinyin to handle homographs (same char, different tone/meaning)
function wordKey(lvl, word) {
  return `${lvl}_${word.char}_${word.pinyin}`;
}
function listenKey(lvl, word) {
  return `listen_${lvl}_${word.char}_${word.pinyin}`;
}
function getLevelAllWords(lvl) {
  const units = getLevelUnits(lvl);
  return units.flat();
}
function getUnitWords(lvl, unitNum) {
  const units = getLevelUnits(lvl);
  return units[unitNum-1] || [];
}
function getUnitCount(lvl) {
  return getLevelUnits(lvl).length;
}
function getCurrentUnit(lvl) {
  return state.currentUnit[lvl] || 1;
}
function isUnitMastered(lvl, unitNum) {
  const words = getUnitWords(lvl, unitNum);
  if (words.length === 0) return false;
  const mastered = words.filter(w => {
    const d = state.srsData[wordKey(lvl,w)];
    return d && d.reps >= 2;
  }).length;
  return (mastered / words.length) >= 0.80;
}
function isListenUnitMastered(lvl, unitNum) {
  const words = getUnitWords(lvl, unitNum);
  if (words.length === 0) return false;
  const mastered = words.filter(w => {
    const d = state.listenSrs[listenKey(lvl,w)];
    return d && d.reps >= 2;
  }).length;
  return (mastered / words.length) >= 0.80;
}
function unitProgress(lvl, unitNum) {
  const words = getUnitWords(lvl, unitNum);
  if (words.length === 0) return {mastered:0, total:0};
  const mastered = words.filter(w => {
    const d = state.srsData[wordKey(lvl,w)];
    return d && d.reps >= 2;
  }).length;
  return {mastered, total: words.length};
}
function listenUnitProgress(lvl, unitNum) {
  const words = getUnitWords(lvl, unitNum);
  if (words.length === 0) return {mastered:0, total:0};
  const mastered = words.filter(w => {
    const d = state.listenSrs[listenKey(lvl,w)];
    return d && d.reps >= 2;
  }).length;
  return {mastered, total: words.length};
}
function isLevelFullyMastered(lvl) {
  const total = getUnitCount(lvl);
  if (total === 0) return false;
  for (let u=1; u<=total; u++) {
    if (!isUnitMastered(lvl, u)) return false;
  }
  return true;
}

// Check unit unlocks within current level: advance currentUnit if current is mastered
function checkUnlocks() {
  // All levels are always unlocked — no mastery gate
  [1,2,3,4,5,6].forEach(lvl => {
    if (!state.unlockedLevels.includes(lvl)) state.unlockedLevels.push(lvl);
    if (!state.currentUnit[lvl]) state.currentUnit[lvl] = 1;
    if (!state.highestUnit) state.highestUnit = {1:1,2:1,3:1,4:1,5:1,6:1};
    if (!state.highestUnit[lvl]) state.highestUnit[lvl] = 1;
  });
}
function getLevelMastery(lvl) {
  const words = getLevelAllWords(lvl);
  if (!words.length) return 0;
  const mastered = words.filter(w => {
    const d = state.srsData[wordKey(lvl,w)];
    return d && d.reps >= 2;
  }).length;
  return mastered / words.length;
}
function getTotalMastered() {
  return Object.values(state.srsData).filter(d => d && d.ease >= 2).length;
}

// --- Mastery counts for all 4 modes across all unlocked levels ---
function getMasteryStats() {
  let vocabTotal=0, vocabMastered=0;
  let listenTotal=0, listenMastered=0;
  let grammarTotal=0, grammarMastered=0;
  let sentenceTotal=0, sentenceMastered=0;

  [1,2,3,4,5,6].forEach(lvl => {
    const words = getLevelAllWords(lvl);
    vocabTotal += words.length;
    vocabMastered += words.filter(w => {
      const d = state.srsData[wordKey(lvl,w)];
      return d && d.reps >= 2;
    }).length;
    listenTotal += words.length;
    listenMastered += words.filter(w => {
      const d = state.listenSrs[listenKey(lvl,w)];
      return d && d.reps >= 2;
    }).length;
    const exs = GRAMMAR_EXERCISES[lvl] || [];
    grammarTotal += exs.length;
    grammarMastered += exs.filter(ex => {
      const d = state.grammarData[grammarKey(ex)];
      return d && d.streak >= 2;
    }).length;
    const sents = SENTENCE_EXERCISES[lvl] || [];
    sentenceTotal += sents.length;
    sentenceMastered += sents.filter(ex => {
      const d = state.sentenceData[sentenceKey(ex)];
      return d && d.streak >= 2;
    }).length;
  });
  return {vocabTotal,vocabMastered,listenTotal,listenMastered,grammarTotal,grammarMastered,sentenceTotal,sentenceMastered};
}
function grammarKey(ex) { return 'gram_' + ex.answer.slice(0,20); }
function sentenceKey(ex) { return 'sent_' + ex.english.slice(0,20); }

// ===== SRS LOGIC =====
function getDueCards(level) {
  // Session is scoped to the current unit only. Within the session, ALL
  // words in the unit are included (not just time-based "due" ones) so
  // that mastery (2x correct) for the whole unit can be completed in one
  // sitting. Words already mastered this session are excluded by
  // renderVocabCard's session-tracking, not here.
  const unitNum = getCurrentUnit(level);
  const words = getUnitWords(level, unitNum);
  return shuffle([...words]);
}
function rateCard(level, word, rating) {
  // rating: 0=again, 1=hard, 2=easy
  // reps tracks consecutive correct answers; mastered when reps>=2
  const key = wordKey(level, word);
  const d = state.srsData[key] || {ease:0, nextRep:0, reps:0};
  const intervals = [10, 1440, 4320, 10080]; // minutes: wrong, 1st correct, mastered, long-term
  if (rating === 0) {
    d.reps = 0; d.ease = 0;
    d.nextRep = Date.now() + intervals[0]*60000;
  } else if (rating === 1) {
    // Hard: don't advance reps, repeat soon
    d.nextRep = Date.now() + intervals[Math.min(d.reps, intervals.length-1)]*60000;
  } else {
    // Easy: advance consecutive correct counter
    d.reps = Math.min(3, d.reps + 1);
    d.ease = Math.min(2, d.ease + 1);
    d.nextRep = Date.now() + intervals[Math.min(d.reps, intervals.length-1)]*60000;
  }
  state.srsData[key] = d;
  checkUnlocks(); saveState(); markStudied();
}

// Listening SRS — same structure, separate namespace
function getListenDueCards(level) {
  const words = getLevelAllWords(level);
  const now = Date.now();
  const due = words.filter(w => {
    const d = state.listenSrs[listenKey(level, w)];
    if (!d) return true;
    return now >= (d.nextRep || 0);
  });
  return shuffle(due);
}
function rateListenCard(level, word, correct) {
  const key = listenKey(level, word);
  const d = state.listenSrs[key] || {ease:0, nextRep:0, reps:0};
  const intervals = [10, 1440, 4320, 10080];
  if (!correct) {
    d.reps = 0; d.ease = 0;
    d.nextRep = Date.now() + intervals[0]*60000;
  } else {
    d.reps = Math.min(3, d.reps + 1);
    d.ease = Math.min(2, d.ease + 1);
    d.nextRep = Date.now() + intervals[Math.min(d.reps, intervals.length-1)]*60000;
  }
  state.listenSrs[key] = d;
  saveState(); markStudied();
}

// Grammar adaptive weighting — only current level; Daily Review handles older levels
function getWeightedExercises(type) {
  const lvl = state.currentLevel;
  const all = GRAMMAR_EXERCISES[lvl] || [];
  const exs = type === 'all' ? all : all.filter(e => e.type === type);
  const weighted = [];
  exs.forEach(ex => {
    const d = state.grammarData[grammarKey(ex)] || {streak:0};
    if (d.streak >= 2) return; // mastered — exclude from active session
    const w = d.streak === 1 ? 2 : 3;
    for (let i=0; i<w; i++) weighted.push(ex);
  });
  return shuffle(weighted);
}

// Sentence adaptive weighting — only current level
function getWeightedSentences() {
  const lvl = state.currentLevel;
  const exs = SENTENCE_EXERCISES[lvl] || [];
  const weighted = [];
  exs.forEach(ex => {
    const d = state.sentenceData[sentenceKey(ex)] || {streak:0};
    if (d.streak >= 2) return; // mastered — exclude from active session
    const w = d.streak === 1 ? 2 : 3;
    for (let i=0; i<w; i++) weighted.push(ex);
  });
  return shuffle(weighted);
}

// Review intervals by streak level (minutes): 0→10min, 1→1day, 2→3days, 3→7days
const REVIEW_INTERVALS = [10, 1440, 4320]; // minutes: wrong→10min, 1st correct→1day, mastered→3days

function recordGrammar(ex, correct) {
  const key = grammarKey(ex);
  const d = state.grammarData[key] || {streak:0, attempts:0, correct:0, nextRep:0};
  d.attempts++;
  if (correct) { d.correct++; d.streak = Math.min(3, d.streak+1); }
  else { d.streak = 0; }
  d.nextRep = Date.now() + REVIEW_INTERVALS[d.streak] * 60000;
  state.grammarData[key] = d;
  saveState(); markStudied();
}
function recordSentence(ex, correct) {
  const key = sentenceKey(ex);
  const d = state.sentenceData[key] || {streak:0, attempts:0, correct:0, nextRep:0};
  d.attempts++;
  if (correct) { d.correct++; d.streak = Math.min(3, d.streak+1); }
  else { d.streak = 0; }
  d.nextRep = Date.now() + REVIEW_INTERVALS[d.streak] * 60000;
  state.sentenceData[key] = d;
  saveState(); markStudied();
}

// Collect completed items due for review across ALL unlocked levels
// "Completed" = answered correctly twice (reps>=2 for vocab/listen, streak>=2 for grammar/sentence)
function getDueReviewItems() {
  const now = Date.now();
  const items = [];

  // Review covers all levels where the user has studied anything
  const studiedLevels = [1,2,3,4,5,6].filter(lvl => {
    const words = getLevelAllWords(lvl);
    return words.some(w => state.srsData[wordKey(lvl,w)] || state.listenSrs[listenKey(lvl,w)]);
  });

  studiedLevels.forEach(lvl => {
    getLevelAllWords(lvl).forEach(w => {
      const d = state.srsData[wordKey(lvl,w)];
      if (d && d.reps >= 2 && now >= (d.nextRep||0)) {
        items.push({kind:'vocab', lvl, word:w});
      }
    });
    getLevelAllWords(lvl).forEach(w => {
      const d = state.listenSrs[listenKey(lvl,w)];
      if (d && d.reps >= 2 && now >= (d.nextRep||0)) {
        items.push({kind:'listen', lvl, word:{...w,level:lvl}});
      }
    });
    (GRAMMAR_EXERCISES[lvl]||[]).forEach(ex => {
      const d = state.grammarData[grammarKey(ex)];
      if (d && d.streak >= 2 && now >= (d.nextRep||0)) {
        items.push({kind:'grammar', lvl, ex});
      }
    });
    (SENTENCE_EXERCISES[lvl]||[]).forEach(ex => {
      const d = state.sentenceData[sentenceKey(ex)];
      if (d && d.streak >= 2 && now >= (d.nextRep||0)) {
        items.push({kind:'sentence', lvl, ex});
      }
    });
  });

  return shuffle(items);
}

function getDueReviewCount() {
  return getDueReviewItems().length;
}

// ===== UTILS =====
function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function getExercises(type) { return getWeightedExercises(type); }
function getSentenceExercises() { return getWeightedSentences(); }
function normalize(s) {
  return s.replace(/[，。！？、：；""''「」【】\s,\.\!\?]/g,'').trim();
}
function checkAnswer(userAns, exercise) {
  const u = normalize(userAns);
  const correct = normalize(exercise.chinese);
  if (u === correct) return true;
  if (exercise.alternates) {
    return exercise.alternates.some(alt => normalize(alt) === u);
  }
  return false;
}
function speakChinese(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'zh-CN';
  utt.rate = 0.85;
  utt.pitch = 1;
  const voices = window.speechSynthesis.getVoices();
  // Prefer zh-CN voices; fall back to any zh voice if zh-CN not available
  const zhCN = voices.find(v => v.lang === 'zh-CN') ||
               voices.find(v => v.lang.startsWith('zh-CN')) ||
               voices.find(v => v.lang === 'zh') ||
               voices.find(v => v.lang.startsWith('zh'));
  if (zhCN) utt.voice = zhCN;
  window.speechSynthesis.speak(utt);
  return utt;
}
let _pendingSpeak = null;
function speakDelayed(char, delayMs) {
  // Cancel any previous pending auto-play to avoid speaking stale words
  if (_pendingSpeak) { clearTimeout(_pendingSpeak); _pendingSpeak = null; }
  _pendingSpeak = setTimeout(() => {
    _pendingSpeak = null;
    speakChinese(char);
  }, delayMs);
}

// ===== NAVIGATION =====
let currentPage = 'home';
function navigate(page) {
  currentPage = page;
  state.lastPage = page;
  saveState();
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+page);
  if (navEl) navEl.classList.add('active');
  renderPage(page);
}
function renderPage(page) {
  const main = document.getElementById('mainContent');
  if (page === 'home') renderHome(main);
  else if (page === 'review') renderReview(main);
  else if (page === 'vocab') renderVocab(main);
  else if (page === 'grammar') renderGrammar(main);
  else if (page === 'listen') renderListen(main);
  else if (page === 'sentence') renderSentence(main);
}

// ===== HOME =====
function renderHome(el) {
  // Per-level stats for each mode
  function levelStats(lvl) {
    const words = getLevelAllWords(lvl);
    const exs = GRAMMAR_EXERCISES[lvl] || [];
    const sents = SENTENCE_EXERCISES[lvl] || [];
    const vocabM = words.filter(w => { const d=state.srsData[wordKey(lvl,w)]; return d&&d.reps>=2; }).length;
    const listenM = words.filter(w => { const d=state.listenSrs[listenKey(lvl,w)]; return d&&d.reps>=2; }).length;
    const grammarM = exs.filter(ex => { const d=state.grammarData[grammarKey(ex)]; return d&&d.streak>=2; }).length;
    const sentM = sents.filter(ex => { const d=state.sentenceData[sentenceKey(ex)]; return d&&d.streak>=2; }).length;
    const unitsT = getUnitCount(lvl);
    let unitsM = 0;
    for (let u=1; u<=unitsT; u++) { if (isUnitMastered(lvl, u)) unitsM++; }
    return {locked:false, vocabM, vocabT:words.length, listenM, listenT:words.length, grammarM, grammarT:exs.length, sentM, sentT:sents.length, unitsM, unitsT};
  }

  const levels = [1,2,3,4,5,6].map(lvl => ({lvl, ...levelStats(lvl)}));

  function levelPips(field, masteredField, totalField) {
    return levels.map(s => {
      const m = s[masteredField], t = s[totalField];
      const done = m === t;
      return `<span class="lvl-pip ${done?'done':''}" title="HSK ${s.lvl}">HSK ${s.lvl}: ${m}/${t}</span>`;
    }).join('');
  }

  function unitProgressCard() {
    const lvl = state.currentLevel;
    const unitsT = getUnitCount(lvl);
    const curUnit = getCurrentUnit(lvl);
    const prog = unitProgress(lvl, curUnit);
    const pct = prog.total ? Math.round(prog.mastered/prog.total*100) : 0;
    return `<div class="unit-progress-card">
      <div class="unit-progress-top">
        <span class="unit-progress-label">HSK ${lvl} · Unit ${curUnit} of ${unitsT}</span>
        <span class="unit-progress-count">${prog.mastered}/${prog.total} mastered</span>
      </div>
      <div class="unit-progress-bar"><div class="unit-progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }

  function modeBar(icon, cn, title, masteredField, totalField, page) {
    const mastered = levels.reduce((sum,s)=>sum+s[masteredField],0);
    const total    = levels.reduce((sum,s)=>sum+s[totalField],0);
    const pct = total ? Math.round(mastered/total*100) : 0;
    return `<div class="mode-progress-card" onclick="navigate('${page}')">
      <div class="mode-progress-top">
        <span class="mode-progress-icon">${icon}</span>
        <div>
          <div class="mode-progress-cn">${cn}</div>
          <div class="mode-progress-title">${title}</div>
        </div>
        <div class="mode-progress-count">${mastered}<span>/${total}</span></div>
      </div>
      <div class="progress-bar" style="margin-top:8px">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="lvl-pip-row">${levelPips(null, masteredField, totalField)}</div>
    </div>`;
  }

  const dueCount = getDueReviewCount();
  const dueLabel = dueCount === 0 ? 'All caught up! ✓' : `${dueCount} item${dueCount===1?'':'s'} due`;
  const dueBadgeColor = dueCount === 0 ? 'var(--green)' : dueCount > 20 ? 'var(--red)' : 'var(--gold)';

  el.innerHTML = `<div class="home">
    <div class="streak-card" style="cursor:pointer" onclick="navigate('review')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="streak-num">${state.streak}</div>
          <div class="streak-label">DAY STREAK 🔥</div>
          <div class="streak-sub">Today: ${state.todayCount} items reviewed</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:28px;font-weight:800;color:${dueBadgeColor}">${dueCount}</div>
          <div style="font-size:11px;color:var(--gray-light);margin-top:2px">due now</div>
          <div style="background:var(--red);color:white;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;margin-top:8px">Start Review →</div>
        </div>
      </div>
    </div>
    ${unitProgressCard()}
    <div class="section-header" style="margin-bottom:10px"><span class="section-title">Progress — tap to study</span></div>
    ${modeBar('🃏','词汇','Vocabulary','vocabM','vocabT','vocab')}
    ${modeBar('👂','听力','Listening','listenM','listenT','listen')}
    ${modeBar('📝','语法','Grammar','grammarM','grammarT','grammar')}
    ${modeBar('✍️','造句','Sentences','sentM','sentT','sentence')}
  </div>`;
}

// ===== VOCAB =====
let vocabDeck = [];
let vocabIdx = 0;
let vocabFlipped = false;
function unitSelectorHTML(lvl, mode) {
  const cur = getCurrentUnit(lvl);
  const total = getUnitCount(lvl);
  const isListen = mode === 'listen';
  const prog = isListen ? listenUnitProgress(lvl, cur) : unitProgress(lvl, cur);
  return `<div class="unit-selector">
    <button class="unit-nav-btn" onclick="changeUnit(-1,'${mode}')" ${cur > 1 ? '' : 'disabled'}>‹</button>
    <span class="unit-selector-label">Unit ${cur} / ${total} &nbsp; (${prog.mastered}/${prog.total} mastered)</span>
    <button class="unit-nav-btn" onclick="changeUnit(1,'${mode}')" ${cur < total ? '' : 'disabled'}>›</button>
  </div>`;
}
function changeUnit(delta, mode) {
  const lvl = state.currentLevel;
  const cur = getCurrentUnit(lvl);
  const total = getUnitCount(lvl);
  const target = cur + delta;
  if (target < 1 || target > total) return;
  if (!state.highestUnit) state.highestUnit = {1:1,2:1,3:1,4:1,5:1,6:1};
  if (target > (state.highestUnit[lvl] || 1)) state.highestUnit[lvl] = target;
  state.currentUnit[lvl] = target;
  saveState();
  navigate(currentPage);
}

function renderVocab(el) {
  vocabDeck = getDueCards(state.currentLevel);
  vocabIdx = 0;
  vocabFlipped = false;
  renderVocabCard(el);
}

// A word counts as "done for this session" once it has reps>=2 (mastered).
function isWordSessionDone(level, word) {
  const d = state.srsData[wordKey(level, word)];
  return d && d.reps >= 2;
}
// Build the next session queue: any unit words not yet mastered this round.
function refillVocabDeck(level) {
  const unitNum = getCurrentUnit(level);
  const words = getUnitWords(level, unitNum);
  const remaining = words.filter(w => !isWordSessionDone(level, w));
  return shuffle(remaining);
}
function renderVocabCard(el) {
  if (!el) el = document.getElementById('mainContent');
  const total = vocabDeck.length;
  const lvl = state.currentLevel;
  if (total === 0) {
    el.innerHTML = `<div class="card-screen">

      <div class="empty-sub">All words in this unit are mastered or scheduled for later review.<br>${getCurrentUnit(lvl) < getUnitCount(lvl) && isUnitMastered(lvl, getCurrentUnit(lvl)) ? 'Tap › above to move to the next unit.' : 'Come back later for spaced review.'}</div>
    </div></div>`;
    return;
  }
  const word = vocabDeck[vocabIdx];
  const pct = Math.round((vocabIdx / total) * 100);
  const srsD = state.srsData[wordKey(state.currentLevel, word)] || {reps:0};
  const repsDots = '●'.repeat(Math.min(2,srsD.reps)) + '○'.repeat(Math.max(0,2-srsD.reps));
  const flipContent = vocabFlipped
    ? `<div class="reveal-content">
        <div class="pinyin-text">${word.pinyin}</div>
        <div class="meaning-text">${word.meaning}</div>
       </div>`
    : `<div class="tap-hint">tap to reveal</div>`;
  el.innerHTML = `<div class="card-screen">
    ${unitSelectorHTML(lvl, 'vocab')}
    <div class="progress-header">
      <span class="progress-text">${vocabIdx+1}/${total}</span>

      <span class="progress-text" style="letter-spacing:2px">${repsDots}</span>
    </div>
    <div class="flashcard" onclick="flipVocabCard()" id="vocabCard">
      <div class="card-level-tag">HSK ${state.currentLevel}</div>
      <div class="card-type-tag">${word.type}</div>
      <div class="char-big">${word.char}</div>
      ${flipContent}
    </div>
    ${vocabFlipped ? `
    <div class="rating-row">
      <button class="rating-btn btn-again" onclick="rateVocab(0)">Again ○○</button>
      <button class="rating-btn btn-hard"  onclick="rateVocab(1)">Hard ●○</button>
      <button class="rating-btn btn-easy"  onclick="rateVocab(2)">Easy ●●</button>
    </div>` : `
    <button class="action-btn btn-secondary" onclick="flipVocabCard()">Reveal Answer</button>`}
  </div>`;
}
function flipVocabCard() {
  vocabFlipped = true;
  renderVocabCard();
}
function rateVocab(rating) {
  const level = state.currentLevel;
  const word = vocabDeck[vocabIdx];
  rateCard(level, word, rating);
  vocabFlipped = false;

  // Remove the current card from the deck
  vocabDeck.splice(vocabIdx, 1);

  // If not yet mastered (reps < 2), requeue it a few cards later so it
  // resurfaces again in this same session.
  if (!isWordSessionDone(level, word)) {
    const insertAt = Math.min(vocabDeck.length, vocabIdx + 2 + Math.floor(Math.random()*2));
    vocabDeck.splice(insertAt, 0, word);
  }

  if (vocabDeck.length === 0) {
    // Unit fully mastered this session — check for unit/level unlock,
    // then refill in case new items are due (re-mastery cycle, etc.)
    checkUnlocks();
    vocabDeck = refillVocabDeck(level);
  }

  if (vocabIdx >= vocabDeck.length) vocabIdx = 0;
  renderVocabCard();
}

// A word counts as "done for this session" (listening) once reps>=2.
function isListenSessionDone(level, word) {
  const d = state.listenSrs[listenKey(level, word)];
  return d && d.reps >= 2;
}
function getListenWords() {
  // Session is scoped to the current unit only — same as vocab.
  const lvl = state.currentLevel;
  const unitNum = getCurrentUnit(lvl);
  const words = getUnitWords(lvl, unitNum)
    .filter(w => !isListenSessionDone(lvl, w))
    .map(w => ({...w, level:lvl}));
  return shuffle(words);
}
function refillListenQueue(level) {
  const unitNum = getCurrentUnit(level);
  const words = getUnitWords(level, unitNum)
    .filter(w => !isListenSessionDone(level, w))
    .map(w => ({...w, level}));
  return shuffle(words);
}
function normalizePinyin(p) {
  return p.toLowerCase()
    .replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e').replace(/[īíǐì]/g,'i')
    .replace(/[ōóǒò]/g,'o').replace(/[ūúǔù]/g,'u').replace(/[ǖǘǚǜ]/g,'u')
    .replace(/\s+/g,'');
}
function getDistractors(correct, allWords, n) {
  const correctNorm = normalizePinyin(correct.pinyin);
  // Exclude same char AND same-sounding (same normalized pinyin) words — they'd be indistinguishable
  const pool = allWords.filter(w => w.char !== correct.char && normalizePinyin(w.pinyin) !== correctNorm);
  return shuffle(pool).slice(0, n);
}
// Pool for distractors: all words across unlocked units of the current level (falls back to whole level)
function getDistractorPool(lvl) {
  const cur = getCurrentUnit(lvl);
  let pool = [];
  for (let u=1; u<=cur; u++) pool = pool.concat(getUnitWords(lvl, u));
  if (pool.length < 4) pool = getLevelAllWords(lvl);
  return pool.map(w => ({...w, level:lvl}));
}

function checkListen(chosen, correct, idx) {
  if (listenAnswered) return;
  listenAnswered = true;

function nextListen() {
  const level = state.currentLevel;
  const word = listenQueue[listenIdx % listenQueue.length];

  const removeIdx = listenIdx % listenQueue.length;
  listenQueue.splice(removeIdx, 1);

  // If not yet mastered for listening, requeue it a couple spots later
  if (!isListenSessionDone(level, word)) {
    const insertAt = Math.min(listenQueue.length, removeIdx + 2 + Math.floor(Math.random()*2));
    listenQueue.splice(insertAt, 0, word);

  if (listenQueue.length === 0) {

function renderSentence(el) {
  if (!el) el = document.getElementById('mainContent');
  sentenceAnswered = false;
  renderSentenceCard(el);
}
function renderSentenceCard(el) {
  if (!el) el = document.getElementById('mainContent');
  const lvl = state.currentLevel;
  const allExs = SENTENCE_EXERCISES[lvl] || [];
  if (allExs.length === 0) {
    el.innerHTML = `<div class="sentence-screen"><div class="empty-state">
      <div class="empty-icon">✍️</div><div class="empty-text">No exercises yet</div>
    </div></div>`;
    return;
  }
  if (sentenceBrowseIdx >= allExs.length) sentenceBrowseIdx = allExs.length - 1;
  if (sentenceBrowseIdx < 0) sentenceBrowseIdx = 0;
  const ex = allExs[sentenceBrowseIdx];
  const total = allExs.length;
  const mStats = getMasteryStats();
  const exData = state.sentenceData[sentenceKey(ex)] || {streak:0};
  const streakDots = '●'.repeat(Math.min(2,exData.streak)) + '○'.repeat(Math.max(0,2-exData.streak));
  el.innerHTML = `<div class="sentence-screen">
    <div class="progress-header">
      <span class="progress-text">✍️ 造句</span>
      <div class="mini-progress"><div class="mini-fill" style="width:${Math.round(mStats.sentenceMastered/Math.max(1,mStats.sentenceTotal)*100)}%"></div></div>
      <span class="score-badge score-correct">${mStats.sentenceMastered}/${mStats.sentenceTotal}</span>
    </div>
    <div class="unit-selector" style="margin-bottom:12px">
      <button class="unit-nav-btn" onclick="browseSentence(-1)" ${sentenceBrowseIdx > 0 ? '' : 'disabled'}>‹</button>
      <span class="unit-selector-label">Exercise ${sentenceBrowseIdx+1} / ${total} &nbsp; <span style="letter-spacing:2px">${streakDots}</span></span>
      <button class="unit-nav-btn" onclick="browseSentence(1)" ${sentenceBrowseIdx < total-1 ? '' : 'disabled'}>›</button>
    </div>
    <div class="sentence-prompt">
      <div class="prompt-label">Translate to Chinese</div>
      <div class="prompt-english">${ex.english}</div>
      <div class="prompt-hint">💡 ${ex.hint}</div>
    </div>
    ${sentenceAnswered ? '' : `
    <textarea class="chinese-input" id="chineseInput" placeholder="在这里写中文..." rows="3"></textarea>
    <button class="action-btn btn-check" onclick="checkSentence()">Check Answer</button>
    <button class="action-btn btn-secondary mt8" onclick="showSentenceAnswer()">Show Answer</button>
    `}
    ${sentenceAnswered ? renderSentenceResult(ex) : ''}
  </div>`;
  if (!sentenceAnswered) {
    setTimeout(() => { const inp = document.getElementById('chineseInput'); if(inp) inp.focus(); }, 100);
  }
}
function browseSentence(delta) {
  const lvl = state.currentLevel;
  const allExs = SENTENCE_EXERCISES[lvl] || [];
  sentenceBrowseIdx = Math.max(0, Math.min(allExs.length - 1, sentenceBrowseIdx + delta));
  sentenceAnswered = false;
  renderSentenceCard();
}
function renderSentenceResult(ex) {
  return `<div class="answer-reveal">
    <div class="answer-label">✓ Model Answer</div>
    <div class="answer-cn">${ex.chinese}</div>
    ${ex.pinyin ? `<div class="answer-pinyin">${ex.pinyin}</div>` : ''}
    ${ex.alternates && ex.alternates.length ? `<div class="answer-alt">Also accepted: ${ex.alternates.join(' / ')}</div>` : ''}
  </div>
  <button class="action-btn btn-primary" onclick="nextSentence()">Next →</button>`;
}
function checkSentence() {
  const inp = document.getElementById('chineseInput');
  if (!inp || !inp.value.trim()) return;
  const lvl = state.currentLevel;
  const ex = (SENTENCE_EXERCISES[lvl] || [])[sentenceBrowseIdx];
  if (!ex) return;
  const correct = checkAnswer(inp.value, ex);
  sentenceAnswered = true;
  recordSentence(ex, correct);
  const screen = document.querySelector('.sentence-screen');
  if (!screen) return;
  const inputArea = screen.querySelector('textarea');
  const checkBtn = screen.querySelector('.btn-check');
  const showBtn = screen.querySelector('.btn-secondary');
  if (inputArea) inputArea.remove();
  if (checkBtn) checkBtn.remove();
  if (showBtn) showBtn.remove();
  const banner = document.createElement('div');
  banner.className = `result-banner ${correct?'correct':'wrong'}`;
  banner.innerHTML = correct ? '✓ Correct!' : `✗ Not quite — see the answer below`;
  screen.appendChild(banner);
  screen.insertAdjacentHTML('beforeend', renderSentenceResult(ex));
}
function showSentenceAnswer() {
  sentenceAnswered = true;
  const lvl = state.currentLevel;
  const ex = (SENTENCE_EXERCISES[lvl] || [])[sentenceBrowseIdx];
  if (!ex) return;
  const screen = document.querySelector('.sentence-screen');
  if (!screen) return;
  const inputArea = screen.querySelector('textarea');
  const checkBtn = screen.querySelector('.btn-check');
  const showBtn = screen.querySelector('.btn-secondary');
  if (inputArea) inputArea.remove();
  if (checkBtn) checkBtn.remove();
  if (showBtn) showBtn.remove();
  screen.insertAdjacentHTML('beforeend', renderSentenceResult(ex));
}
function nextSentence() {
  browseSentence(1);
}

// ===== LEVEL MODAL =====
function showLevelModal() {

function selectLevel(lvl) {
  state.currentLevel = lvl;
  grammarBrowseIdx = 0;

  hideLevelModal();
  renderPage(currentPage);
}

// ===== DAILY REVIEW =====
let reviewQueue = [];
let reviewIdx = 0;
let reviewFlipped = false;
let reviewAnswered = false;
let reviewStats = {vocab:0, listen:0, grammar:0, sentence:0, correct:0, wrong:0};

function updateNavBadge() {
  const n = getDueReviewCount();
  const existing = document.querySelector('#nav-review .nav-badge');
  if (existing) existing.remove();
  if (n > 0) {
    const badge = document.createElement('div');
    badge.className = 'nav-badge';
    badge.textContent = n > 99 ? '99+' : n;
    document.getElementById('nav-review').appendChild(badge);
  }
}

function renderReview(el) {
  if (!el) el = document.getElementById('mainContent');
  reviewQueue = getDueReviewItems();
  reviewIdx = 0;
  reviewFlipped = false;
  reviewAnswered = false;
  reviewStats = {vocab:0, listen:0, grammar:0, sentence:0, correct:0, wrong:0};
  if (reviewQueue.length === 0) {
    el.innerHTML = `<div class="review-screen"><div class="empty-state">
      <div class="empty-icon">🎉</div>
      <div class="empty-text">All caught up!</div>
      <div class="empty-sub">Nothing due for review right now.<br>Come back later to keep your memory sharp.</div>
    </div></div>`;
    return;
  }
  renderReviewItem(el);
}

function renderReviewItem(el) {
  if (!el) el = document.getElementById('mainContent');
  if (reviewIdx >= reviewQueue.length) {
    renderReviewSummary(el);
    return;
  }
  const item = reviewQueue[reviewIdx];
  const progress = Math.round(reviewIdx / reviewQueue.length * 100);
  const hdr = `<div class="review-screen">
    <div class="progress-header">
      <span class="progress-text">${reviewIdx+1}/${reviewQueue.length}</span>
      <div class="mini-progress"><div class="mini-fill" style="width:${progress}%"></div></div>
      <span class="score-badge score-correct">✓ ${reviewStats.correct}</span>
    </div>`;

  if (item.kind === 'vocab') {
    renderReviewVocab(el, item, hdr);
  } else if (item.kind === 'listen') {
    renderReviewListen(el, item, hdr);
  } else if (item.kind === 'grammar') {
    renderReviewGrammar(el, item, hdr);
  } else if (item.kind === 'sentence') {
    renderReviewSentence(el, item, hdr);
  }
}

// --- Review: Vocab flashcard ---
function renderReviewVocab(el, item, hdr) {
  const w = item.word;
  const srsD = state.srsData[wordKey(item.lvl,w)] || {ease:0};
  const srsLabel = ['New','Learning','Familiar','Mastered'][Math.min(3,srsD.ease)];
  el.innerHTML = hdr + `
    <span class="review-kind-tag kind-vocab">🃏 Vocab</span>
    <span class="review-level-tag">HSK ${item.lvl} · ${srsLabel}</span>
    <div class="flashcard" onclick="flipReviewVocab()" id="reviewVocabCard">
      <div class="card-level-tag">HSK ${item.lvl}</div>
      <div class="card-type-tag">${w.type}</div>
      <div class="char-big">${w.char}</div>
      ${reviewFlipped
        ? `<div class="reveal-content"><div class="pinyin-text">${w.pinyin}</div><div class="meaning-text">${w.meaning}</div></div>`
        : `<div class="tap-hint">tap to reveal</div>`}
    </div>
    ${reviewFlipped ? `
    <div class="rating-row">
      <button class="rating-btn btn-again" onclick="rateReviewVocab(0)">Again<br><small>🔄</small></button>
      <button class="rating-btn btn-hard"  onclick="rateReviewVocab(1)">Hard<br><small>😐</small></button>
      <button class="rating-btn btn-easy"  onclick="rateReviewVocab(2)">Easy<br><small>✓</small></button>
    </div>` : `<button class="action-btn btn-secondary" onclick="flipReviewVocab()">Reveal</button>`}
  </div>`;
}
function flipReviewVocab() { reviewFlipped = true; renderReviewItem(); }
function rateReviewVocab(rating) {
  const item = reviewQueue[reviewIdx];
  rateCard(item.lvl, item.word, rating);
  reviewStats.vocab++;
  if (rating === 2) reviewStats.correct++; else reviewStats.wrong++;
  reviewIdx++; reviewFlipped = false; reviewAnswered = false;
  renderReviewItem();
}

// --- Review: Listening (hear → pick meaning) ---
function renderReviewListen(el, item, hdr) {
  const w = item.word;
  const allWords = [];
  [1,2,3,4,5,6].forEach(lvl => getLevelAllWords(lvl).forEach(ww => allWords.push({...ww,level:lvl})));
  const distractors = getDistractors(w, allWords, 3);
  const options = shuffle([w, ...distractors]);
  currentReviewListenOptions = options;
  const lisD = state.listenSrs[listenKey(item.lvl, w)] || {ease:0};
  const lisLabel = ['New','Learning','Familiar','Mastered'][Math.min(3,lisD.ease)];
  el.innerHTML = hdr + `
    <span class="review-kind-tag kind-listen">👂 Listen</span>
    <span class="review-level-tag">HSK ${item.lvl} · ${lisLabel}</span>
    <div class="listen-card" style="margin-bottom:16px">
      <button class="speak-btn" id="reviewSpeakBtn" onclick="reviewPlayWord('${w.char.replace(/'/g,"\\'")}')">🔊</button>
      <div class="listen-prompt">What does this word mean?</div>
      <div class="options-list">
        ${options.map((opt,i) => `<button class="option-btn" id="revLisOpt${i}" onclick="checkReviewListen('${opt.char.replace(/'/g,"\\'")}','${w.char.replace(/'/g,"\\'")}',${i})">${opt.meaning}</button>`).join('')}
      </div>
    </div>
  </div>`;
  speakDelayed(w.char, 300);
}
function reviewPlayWord(char) {
  const btn = document.getElementById('reviewSpeakBtn');
  if (btn) { btn.classList.add('playing'); setTimeout(()=>btn.classList.remove('playing'),1500); }
  speakChinese(char);
}
function checkReviewListen(chosen, correct, idx) {
  if (reviewAnswered) return;
  reviewAnswered = true;
  const item = reviewQueue[reviewIdx];
  const isCorrect = chosen === correct;
  rateListenCard(item.lvl, item.word, isCorrect);
  reviewStats.listen++;
  if (isCorrect) reviewStats.correct++; else reviewStats.wrong++;

  // Show result on buttons (use exactly what was rendered, don't reshuffle)
  const options = currentReviewListenOptions;
  options.forEach((opt,i) => {
    const btn = document.getElementById('revLisOpt'+i);
    if (!btn) return;
    if (opt.char === correct) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('wrong');
    btn.onclick = null;
  });
  const card = document.querySelector('.listen-card');
  if (card) {
    const info = document.createElement('div');
    info.style.cssText = 'margin-top:12px;padding:10px;background:var(--paper);border-radius:10px;text-align:center';
    info.innerHTML = `<b>${item.word.char}</b> &nbsp; <span style="color:var(--red)">${item.word.pinyin}</span> &nbsp; <span style="color:var(--gray)">${item.word.meaning}</span>`;
    card.appendChild(info);
  }
  const screen = document.querySelector('.review-screen');
  if (screen) {
    const btn = document.createElement('button');
    btn.className = 'action-btn btn-primary mt12';
    btn.textContent = 'Next →';
    btn.onclick = () => { reviewIdx++; reviewAnswered=false; renderReviewItem(); };
    screen.appendChild(btn);
  }
}

// --- Review: Grammar ---
let reviewReorderAnswer = [];
let reviewReorderSource = [];
let reviewReorderExKey = null; // tracks which exercise the current tiles belong to
let currentReviewExOptions = []; // shuffled options for review fill/error exercises
let reviewExOptionsKey = null; // tracks which exercise the current options belong to
let currentReviewListenOptions = []; // the exact options array rendered for the current review listen card
function renderReviewGrammar(el, item, hdr) {
  const ex = item.ex;
  const d = state.grammarData[grammarKey(ex)] || {streak:0};
  const streakDots = '●'.repeat(Math.min(2,d.streak))+'○'.repeat(Math.max(0,2-d.streak));
  const typeLabels = {reorder:'Reorder', fill:'Fill In', error:'Error Correction'};
  const exKey = grammarKey(ex);
  if (!reviewAnswered && ex.type === 'reorder' && reviewReorderExKey !== exKey) {
    reviewReorderAnswer = [];
    reviewReorderSource = shuffle([...ex.words]);
    reviewReorderExKey = exKey;
  }
  let body = '';
  if (ex.type === 'reorder') body = renderReviewReorderBody(ex);
  else if (ex.type === 'fill') body = renderReviewFillBody(ex);
  else if (ex.type === 'error') body = renderReviewErrorBody(ex);

  el.innerHTML = hdr + `
    <span class="review-kind-tag kind-grammar">📝 Grammar</span>
    <span class="review-level-tag">HSK ${item.lvl} &nbsp; <span style="letter-spacing:2px">${streakDots}</span></span>
    <div class="exercise-card">
      <div class="ex-pattern">${ex.pattern}</div>
      <div class="ex-instruction">${typeLabels[ex.type]} · ${ex.translation}</div>
      ${body}
    </div>
  </div>`;
}
function renderReviewReorderBody(ex) {
  const answerTiles = reviewReorderAnswer.map((w,i)=>`<div class="tile" onclick="revReorderBack(${i})">${w}</div>`).join('')
    || `<span style="color:var(--gray-light);font-size:13px">Tap words to build the sentence</span>`;
  const sourceTiles = reviewReorderSource.map((w,i)=>`<div class="tile source" onclick="revReorderAdd(${i})">${w}</div>`).join('');
  const userJoined = normalize(reviewReorderAnswer.join(''));
  let isCorrect = userJoined === normalize(ex.answer);
  if (!isCorrect && ex.alternates) {
    isCorrect = ex.alternates.some(alt => normalize(alt) === userJoined);
  }
  const result = reviewAnswered ? getResultBannerRaw(isCorrect, ex) : '';
  return `<div class="answer-zone-label">Your answer:</div>
    <div class="tiles-zone ${reviewReorderAnswer.length?'has-tiles':''}">${answerTiles}</div>
    <div class="tiles-zone" style="border-style:solid;border-color:var(--gray-light)">${sourceTiles}</div>
    ${result}
    ${reviewAnswered
      ? `<div class="hint-text">💡 ${ex.hint}</div><button class="action-btn btn-primary mt12" onclick="nextReviewItem()">Next →</button>`
      : `<div style="display:flex;gap:8px;margin-top:12px">
           <button class="action-btn btn-secondary" style="flex:1" onclick="revReorderClear()">Clear</button>
           <button class="action-btn btn-check" style="flex:2" onclick="checkReviewReorder()">Check</button>
         </div>`}`;
}
function revReorderAdd(i) { if(reviewAnswered)return; reviewReorderAnswer.push(reviewReorderSource[i]); reviewReorderSource.splice(i,1); renderReviewItem(); }
function revReorderBack(i) { if(reviewAnswered)return; reviewReorderSource.push(reviewReorderAnswer[i]); reviewReorderAnswer.splice(i,1); renderReviewItem(); }
function revReorderClear() { const ex=reviewQueue[reviewIdx].ex; reviewReorderSource=shuffle([...ex.words]); reviewReorderAnswer=[]; renderReviewItem(); }
function checkReviewReorder() {
  const ex = reviewQueue[reviewIdx].ex;
  const userJoined = normalize(reviewReorderAnswer.join(''));
  let correct = userJoined === normalize(ex.answer);
  if (!correct && ex.alternates) {
    correct = ex.alternates.some(alt => normalize(alt) === userJoined);
  }
  reviewAnswered = true;
  recordGrammar(ex, correct);
  reviewStats.grammar++;
  if (correct) reviewStats.correct++; else reviewStats.wrong++;
  renderReviewItem();
}
function renderReviewFillBody(ex) {
  const parts = ex.sentence.split('___');
  const sent = parts.map((p,i)=>i<parts.length-1?`${p}<span class="blank-slot" id="revFillBlank${i}">___</span>`:p).join('');
  const exKey = grammarKey(ex);
  if (!reviewAnswered && reviewExOptionsKey !== exKey) {
    currentReviewExOptions = shuffle([...ex.options]);
    reviewExOptionsKey = exKey;
  }
  const opts = currentReviewExOptions.map((opt,i)=>`<button class="option-btn" id="revFillOpt${i}" onclick="checkReviewFill('${opt.replace(/'/g,"\\'")}',${i})">${opt}</button>`).join('');
  return `<div class="fill-sentence">${sent}</div><div class="options-list">${opts}</div>`;
}
function checkReviewFill(chosen, idx) {
  if (reviewAnswered) return;
  reviewAnswered = true;
  const ex = reviewQueue[reviewIdx].ex;
  const correct = chosen === ex.answer;
  recordGrammar(ex, correct);
  reviewStats.grammar++;
  if (correct) reviewStats.correct++; else reviewStats.wrong++;
  currentReviewExOptions.forEach((opt,i) => {
    const btn = document.getElementById('revFillOpt'+i);
    if (!btn) return;
    if (opt===ex.answer) btn.classList.add('correct');
    else if (i===idx && !correct) btn.classList.add('wrong');
    btn.onclick = null;
  });
  document.querySelectorAll('.blank-slot').forEach(b=>{ b.textContent=ex.answer; b.style.color=correct?'var(--green)':'var(--red)'; });
  const card = document.querySelector('.exercise-card');
  if (card) { card.insertAdjacentHTML('beforeend', `<div class="hint-text">💡 ${ex.hint}</div>${getResultBannerRaw(correct,ex)}<button class="action-btn btn-primary mt12" onclick="nextReviewItem()">Next →</button>`); }
}
function renderReviewErrorBody(ex) {
  const exKey = grammarKey(ex);
  if (!reviewAnswered && reviewExOptionsKey !== exKey) {
    currentReviewExOptions = shuffle([...ex.options]);
    reviewExOptionsKey = exKey;
  }
  return `<div class="error-sentence">❌ ${ex.sentence}</div>
    <div class="ex-instruction" style="margin-bottom:12px">Choose the correct version:</div>
    <div class="options-list">${currentReviewExOptions.map((opt,i)=>`<button class="option-btn" id="revErrOpt${i}" onclick="checkReviewError('${opt.replace(/'/g,"\\'")}',${i})">${opt}</button>`).join('')}</div>`;
}
function checkReviewError(chosen, idx) {
  if (reviewAnswered) return;
  reviewAnswered = true;
  const ex = reviewQueue[reviewIdx].ex;
  const correct = chosen === ex.answer;
  recordGrammar(ex, correct);
  reviewStats.grammar++;
  if (correct) reviewStats.correct++; else reviewStats.wrong++;
  currentReviewExOptions.forEach((opt,i) => {
    const btn = document.getElementById('revErrOpt'+i);
    if (!btn) return;
    if (opt===ex.answer) btn.classList.add('correct');
    else if (i===idx && !correct) btn.classList.add('wrong');
    btn.onclick = null;
  });
  const card = document.querySelector('.exercise-card');
  if (card) { card.insertAdjacentHTML('beforeend', `<div class="hint-text">💡 ${ex.hint}</div>${getResultBannerRaw(correct,ex)}<button class="action-btn btn-primary mt12" onclick="nextReviewItem()">Next →</button>`); }
}

// --- Review: Sentence ---
function renderReviewSentence(el, item, hdr) {
  const ex = item.ex;
  const d = state.sentenceData[sentenceKey(ex)] || {streak:0};
  const streakDots = '●'.repeat(Math.min(2,d.streak))+'○'.repeat(Math.max(0,2-d.streak));
  el.innerHTML = hdr + `
    <span class="review-kind-tag kind-sentence">✍️ Sentence</span>
    <span class="review-level-tag">HSK ${item.lvl} &nbsp; <span style="letter-spacing:2px">${streakDots}</span></span>
    <div class="sentence-prompt">
      <div class="prompt-label">Translate to Chinese</div>
      <div class="prompt-english">${ex.english}</div>
      <div class="prompt-hint">💡 ${ex.hint}</div>
    </div>
    ${reviewAnswered ? renderReviewSentenceResult(ex) : `
    <textarea class="chinese-input" id="reviewSentInput" placeholder="在这里写中文..." rows="3"></textarea>
    <button class="action-btn btn-check" onclick="checkReviewSentence()">Check Answer</button>
    <button class="action-btn btn-secondary mt8" onclick="showReviewSentenceAnswer()">Show Answer</button>`}
  </div>`;
  if (!reviewAnswered) setTimeout(()=>{const i=document.getElementById('reviewSentInput');if(i)i.focus();},100);
}
function renderReviewSentenceResult(ex) {
  return `<div class="answer-reveal">
    <div class="answer-label">✓ Model Answer</div>
    <div class="answer-cn">${ex.chinese}</div>
    ${ex.pinyin?`<div class="answer-pinyin">${ex.pinyin}</div>`:''}
    ${ex.alternates&&ex.alternates.length?`<div class="answer-alt">Also: ${ex.alternates.join(' / ')}</div>`:''}
  </div>
  <button class="action-btn btn-primary" onclick="nextReviewItem()">Next →</button>`;
}
function checkReviewSentence() {
  const inp = document.getElementById('reviewSentInput');
  if (!inp||!inp.value.trim()) return;
  const ex = reviewQueue[reviewIdx].ex;
  const correct = checkAnswer(inp.value, ex);
  reviewAnswered = true;
  recordSentence(ex, correct);
  reviewStats.sentence++;
  if (correct) reviewStats.correct++; else reviewStats.wrong++;
  const screen = document.querySelector('.review-screen');
  if (!screen) return;
  screen.querySelector('textarea')?.remove();
  screen.querySelector('.btn-check')?.remove();
  screen.querySelector('.btn-secondary')?.remove();
  const banner = document.createElement('div');
  banner.className = `result-banner ${correct?'correct':'wrong'}`;
  banner.innerHTML = correct ? '✓ Correct!' : '✗ Not quite — see the answer below';
  screen.appendChild(banner);
  screen.insertAdjacentHTML('beforeend', renderReviewSentenceResult(ex));
}
function showReviewSentenceAnswer() {
  reviewAnswered = true;
  const ex = reviewQueue[reviewIdx].ex;
  recordSentence(ex, false); // counts as not correct since they gave up
  reviewStats.sentence++;
  reviewStats.wrong++;
  const screen = document.querySelector('.review-screen');
  screen.querySelector('textarea')?.remove();
  screen.querySelector('.btn-check')?.remove();
  screen.querySelector('.btn-secondary')?.remove();
  screen.insertAdjacentHTML('beforeend', renderReviewSentenceResult(ex));
}

function nextReviewItem() {
  reviewIdx++;
  reviewAnswered = false;
  reviewFlipped = false;
  reviewReorderAnswer = [];
  reviewReorderSource = [];
  reviewReorderExKey = null;
  reviewExOptionsKey = null;
  renderReviewItem();
}

function renderReviewSummary(el) {
  const total = reviewQueue.length;
  const pct = total ? Math.round(reviewStats.correct/total*100) : 0;
  updateNavBadge();
  el.innerHTML = `<div class="review-screen">
    <div class="review-summary">
      <div style="font-size:40px;margin-bottom:12px">🎉</div>
      <div class="review-summary-num">${pct}%</div>
      <div class="review-summary-label">Review Complete · ${total} items</div>
      <div class="review-breakdown">
        <div class="review-breakdown-item">
          <div class="review-breakdown-num" style="color:var(--green)">${reviewStats.correct}</div>
          <div class="review-breakdown-lbl">Correct</div>
        </div>
        <div class="review-breakdown-item">
          <div class="review-breakdown-num" style="color:var(--red)">${reviewStats.wrong}</div>
          <div class="review-breakdown-lbl">Wrong</div>
        </div>
        <div class="review-breakdown-item">
          <div class="review-breakdown-num">${reviewStats.vocab + reviewStats.listen}</div>
          <div class="review-breakdown-lbl">Words</div>
        </div>
        <div class="review-breakdown-item">
          <div class="review-breakdown-num">${reviewStats.grammar + reviewStats.sentence}</div>
          <div class="review-breakdown-lbl">Grammar/Writing</div>
        </div>
      </div>
      <div style="font-size:13px;color:var(--gray);margin-top:8px">Items answered correctly come back less often.<br>Wrong answers return sooner.</div>
    </div>
    <button class="action-btn btn-primary mt12" onclick="navigate('home')">Back to Home</button>
  </div>`;
}

// ===== INIT =====
// Ensure speech voices are loaded
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
loadState();
document.getElementById('currentLevelBadge').textContent = state.currentLevel;
updateNavBadge();
// Restore last page visited
const startPage = state.lastPage || 'home';
currentPage = startPage;
document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
const navEl = document.getElementById('nav-'+startPage);
if (navEl) navEl.classList.add('active');
renderPage(startPage);
</script>
</body>
</html>
